<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        header { background: #16213e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f3460; }
        header h2 { color: #e94560; }
        header span { font-size: 14px; color: #aaa; }
        header a { color: #e94560; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background: #16213e; padding: 15px; border-right: 1px solid #0f3460; overflow-y: auto; }
        .sidebar h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }
        #target-input { width: 100%; padding: 8px; background: #0f3460; border: none; border-radius: 6px; color: #eee; font-size: 14px; margin-bottom: 10px; }
        #target-input::placeholder { color: #888; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .message.sent { background: #e94560; align-self: flex-end; border-bottom-right-radius: 3px; }
        .message.received { background: #0f3460; align-self: flex-start; border-bottom-left-radius: 3px; }
        .message .meta { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .input-area { padding: 15px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
        #message-input { flex: 1; padding: 12px 15px; background: #0f3460; border: none; border-radius: 25px; color: #eee; font-size: 14px; outline: none; }
        #message-input::placeholder { color: #888; }
        #send-btn { padding: 12px 25px; background: #e94560; border: none; border-radius: 25px; color: white; font-size: 14px; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background: #c73652; }
        .status { text-align: center; font-size: 12px; color: #aaa; padding: 5px; }
        .tip { font-size: 12px; color: #888; padding: 8px; background: #0f3460; border-radius: 6px; }
    </style>
</head>
<body>

<header>
    <h2>💬 SecureChat</h2>
    <div>
        <span>Logged in as: <strong style="color:#e94560">{{ username }}</strong></span>
        <a href="/logout">Logout</a>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <h3>Send To</h3>
        <input type="text" id="target-input" placeholder="Enter username..." />
        <p class="tip">Type the exact username of the person you want to message.</p>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="status">Connected ✅ — Enter a username on the left to start chatting</div>
        </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const currentUser = "{{ username }}";

    socket.on("connect", function () {
        console.log("Socket connected!");
        addStatus("🟢 Connected to server");
    });

    socket.on("disconnect", function () {
        addStatus("🔴 Disconnected from server");
    });

    // Receive private messages
    socket.on("private_message", function (data) {
        addMessage(data.sender, data.message, "received");
    });

    // Send message on button click
    document.getElementById("send-btn").addEventListener("click", sendMessage);

    // Send message on Enter key
    document.getElementById("message-input").addEventListener("keypress", function (e) {
        if (e.key === "Enter") sendMessage();
    });

    function sendMessage() {
        const target = document.getElementById("target-input").value.trim();
        const message = document.getElementById("message-input").value.trim();

        if (!target) {
            alert("Please enter a username to send to!");
            return;
        }
        if (!message) return;

        socket.emit("private_message", { target: target, message: message });
        addMessage("You → " + target, message, "sent");
        document.getElementById("message-input").value = "";
    }

    function addMessage(sender, message, type) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = `<div class="meta">${sender}</div>${message}`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function addStatus(text) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "status";
        div.textContent = text;
        messages.appendChild(div);
    }
</script>

</body>
</html>
