<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SecureChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f0a;
      --panel: #0e160e;
      --border: #1a2a1a;
      --accent: #10b981;
      --accent2: #06b6d4;
      --text: #f0f5f0;
      --muted: #6b806b;
      --error: #f87171;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.15;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: var(--accent); top: -180px; right: -100px; animation-delay: 0s; }
    .orb2 { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; left: -60px; animation-delay: -6s; }
    .orb3 { width: 280px; height: 280px; background: #f59e0b; top: 50%; left: 30%; animation-delay: -10s; }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(25px, 18px) scale(1.07); }
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(16,185,129,0.08);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 20px; letter-spacing: -0.5px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 8px; letter-spacing: 0.3px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(16,185,129,0.06);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
    }
    input::placeholder { color: var(--muted); }

    .strength-bar {
      height: 4px; border-radius: 4px;
      background: var(--border); margin-top: 8px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; width: 0%; border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .btn {
      width: 100%; padding: 14px; margin-top: 10px;
      background: linear-gradient(135deg, var(--accent), #059669);
      border: none; border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(16,185,129,0.4); }
    .btn:active { transform: translateY(0); }

    .footer-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
    .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }

    .divider { height: 1px; background: var(--border); margin: 28px 0; }

    .perks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .perk { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
    .perk-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <span class="logo-text">SecureChat</span>
  </div>

  <h1>Create account</h1>
  <p class="subtitle">Join SecureChat — private, fast, secure</p>

  <div class="perks">
    <div class="perk"><div class="perk-dot"></div>End-to-end encrypted messages</div>
    <div class="perk"><div class="perk-dot"></div>Private direct messaging</div>
    <div class="perk"><div class="perk-dot"></div>No data sold, ever</div>
  </div>

  <form method="POST" action="/register">
    <div class="field">
      <label for="username">Choose a username</label>
      <input type="text" id="username" name="username" placeholder="e.g. cooluser123" required autofocus />
    </div>

    <div class="field">
      <label for="password">Create a password</label>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label">Enter a password</div>
    </div>

    <button class="btn" type="submit">Create Account →</button>
  </form>

  <div class="divider"></div>

  <p class="footer-link">
    Already have an account? <a href="/login">Sign in</a>
  </p>
</div>

<script>
  const passwordInput = document.getElementById('password');
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');

  passwordInput.addEventListener('input', () => {
    const val = passwordInput.value;
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: 'Enter a password' },
      { pct: '25%',  color: '#f87171',     text: 'Weak' },
      { pct: '50%',  color: '#fb923c',     text: 'Fair' },
      { pct: '75%',  color: '#facc15',     text: 'Good' },
      { pct: '100%', color: '#10b981',     text: 'Strong ✓' },
    ];

    const lvl = val.length === 0 ? 0 : strength;
    fill.style.width = levels[lvl].pct;
    fill.style.background = levels[lvl].color;
    label.textContent = levels[lvl].text;
    label.style.color = levels[lvl].color === 'transparent' ? 'var(--muted)' : levels[lvl].color;
  });
</script>

</body>
</html>
